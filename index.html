<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הצטרפות לבית חינוך גורדון</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { max-width: 600px; background: white; padding: 15px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        /* התמונה הופכת לקישור */
        .flyer-link { display: block; width: 100%; cursor: pointer; transition: transform 0.2s; }
        .flyer-link:hover { transform: scale(1.02); }
        img { width: 100%; height: auto; display: block; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="https://share.google/UwaBIQYcdxD2UkQOW" class="flyer-link" target="_blank">
            <img src="./1783491331593.png" alt="לחץ כאן להגשת מועמדות">
        </a>
    </div>
</body>
</html>

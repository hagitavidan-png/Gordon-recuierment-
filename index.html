<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הצטרפות לבית חינוך גורדון</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 20px auto; background: white; padding: 15px; border-radius: 10px; }
        img { width: 100%; height: auto; display: block; border-radius: 5px; }
        form { margin-top: 20px; padding: 20px; border-top: 2px solid #eee; }
        label { display: block; margin-top: 15px; font-weight: bold; }
        input { display: block; width: 100%; padding: 10px; margin-top: 5px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { display: block; width: 100%; padding: 12px; margin-top: 25px; background: #2c3e50; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <img src="./1783491331593.png" alt="פלייר גורדון">
        
        <form action="https://formspree.io/f/xnjkygbe" method="POST" enctype="multipart/form-data">
            <label>שם מלא:</label>
            <input type="text" name="name" required>
            
            <label>מייל ליצירת קשר:</label>
            <input type="email" name="email" required>
            
            <label>העלאת קורות חיים (PDF/Word):</label>
            <input type="file" name="resume" accept=".pdf,.doc,.docx" required>
            
            <button type="submit">שלח להנהלה</button>
        </form>
    </div>
</body>
</html>

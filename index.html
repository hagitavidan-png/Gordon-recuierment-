<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>הצטרפות לבית חינוך גורדון</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 15px; }
        img { width: 100%; border-radius: 10px; }
        form { margin-top: 20px; text-align: right; padding: 20px; border: 1px solid #ddd; border-radius: 10px; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input { display: block; width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; }
        button { display: block; width: 100%; padding: 10px; margin-top: 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <img src="1783491150269.png" alt="פלייר גורדון">
        
        <h3>הגשת מועמדות</h3>
        <form action="https://formspree.io/f/xnjkygbe" method="POST" enctype="multipart/form-data">
            <label>שם מלא:</label>
            <input type="text" name="name" required>
            
            <label>מייל ליצירת קשר:</label>
            <input type="email" name="email" required>
            
            <label>העלאת קורות חיים (PDF/Word):</label>
            <input type="file" name="resume" accept=".pdf,.doc,.docx" required>
            
            <button type="submit">שלח להנהלה</button>
        </form>
    </div>
</body>
</html>
